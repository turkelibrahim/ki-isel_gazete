<!doctype html>
<html lang="tr">
<head><meta charset="utf-8" /><title>{{title}}</title></head>
<body style="margin:0;padding:0;background:#f5f2ea;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:24px;">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;max-width:100%;">
        <tr><td style="padding:24px;border-bottom:1px solid #eee;">
          <h1 style="margin:0;color:#111;">SmartNewspaper</h1>
          <p style="margin:8px 0 0;color:#777;">Kritik duyuru bildirimi</p>
        </td></tr>
        <tr><td style="padding:24px;">
          <span style="display:inline-block;background:#b91c1c;color:white;padding:6px 10px;border-radius:999px;font-size:12px;">Kritik Duyuru</span>
          <h2 style="color:#111;">{{title}}</h2>
          <p style="color:#333;line-height:1.6;">{{message}}</p>
          <p><strong>Etkinlik Tarihi:</strong> {{eventDate}}</p>
          <p><strong>Kalan Süre:</strong> {{remainingTime}}</p>
          <a href="{{detailUrl}}" style="display:inline-block;background:#111;color:#fff;padding:12px 18px;border-radius:10px;text-decoration:none;">Detayları Gör</a>
        </td></tr>
        <tr><td style="padding:18px 24px;background:#fafafa;color:#777;font-size:12px;">
          Bu bildirimi SmartNewspaper bildirim tercihleriniz nedeniyle aldınız.<br />
          <a href="{{preferencesUrl}}">Bildirim tercihlerini yönet</a>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
